[platformio]
default_envs = main

[env]
framework = arduino
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.30-2/platform-espressif32.zip
platform_packages =
    framework-arduinoespressif32 @ https://github.com/espressif/arduino-esp32.git#3.3.0
board = esp32-s3-devkitc-1
monitor_speed = 115200
; 'colorize' ist in VS Code meist Standard, Filter heißt 'direct' oder weglassen
monitor_filters = 
    esp32_exception_decoder
    time

[env:main]
lib_deps = symlink://..
build_src_filter = +<main.cpp> -<test_*.cpp>

[env:sinewave]
lib_deps = symlink://..
build_src_filter = +<test_sineWave.cpp> -<main.cpp>

[env:test_sequence]
lib_deps = symlink://..
build_src_filter = +<test_sequence.cpp> -<main.cpp> -<test_sineWave.cpp>