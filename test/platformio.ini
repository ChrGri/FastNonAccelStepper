[platformio]

[env]
framework = arduino
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.30-2/platform-espressif32.zip
platform_packages =
    framework-arduinoespressif32 @ https://github.com/espressif/arduino-esp32.git#3.3.0

[env:esp32s3_generic]
platform = espressif32
board = esp32-s3-devkitc-1
lib_deps = 
  symlink://..


; --- Add these lines for Serial Monitor ---
monitor_speed = 115200
monitor_filters = 
    esp32_exception_decoder
    time
    colorize